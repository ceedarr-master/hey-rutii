<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/jpeg" href="favicon.jpg">
<link rel="apple-touch-icon" href="favicon.jpg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Hey Rutii">
<title>Hey Rutii</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    /* Main Brand (from Figma Hey Rutii Design System) */
    --brand-gradient: linear-gradient(135deg, #46efc5 0%, #00c8de 100%);
    --accent-color: #00c6b8;
    --bg-accent: #def7f2;
    --border-accent: #00c6b8;
    --btn-shadow: rgba(70, 239, 197, 0.35);

    /* Backgrounds & Cards */
    --bg-body: linear-gradient(160deg, #eafff6 0%, #fff8ec 100%);
    --bg-card: #ffffff;
    --bg-secondary: #edf8f6;
    --border-card: #c7e3e8;
    --border-base: #d7eae9;

    /* Border Radius (from Figma Button & Card Components) */
    --radius-xs: 6px;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 20px;
    --radius-2xl: 24px;
    --radius-3xl: 28px;
    --shadow-card: rgba(0, 200, 222, 0.12);
    --shadow-card-light: rgba(70, 239, 197, 0.08);

    /* Text */
    --text-primary: #2b2b2b;
    --text-secondary: #9cb3b0;
    --text-muted: #9cb3b0;
    --text-highlight: #6c807e;
    --text-warning: #769588;
    --text-danger: #ff8816;
    --color-danger-light: #ffc9b8;
    --text-notice: #ffe302;
    --text-notice-bold: #0cc291;
    --text-white: #ffffff;

    /* Status & Alerts */
    --bg-warning: rgb(156 207 196 / 30%);
    --bg-danger: #fff0ec;
    --bg-notice: #fff9db;
    --bg-toast: rgba(43, 43, 43, 0.95);
    --shadow-toast: 0 8px 24px rgba(0, 0, 0, 0.2);

    /* Disabled */
    --bg-disabled: #eafaf5;
    --text-disabled: #6e8d89;

    /* Progress Bar */
    --progress-done: #00c2a8;
    --progress-current: #ff7a59;

    /* Badges */
    --badge-bg: #def7f2;
    --badge-text: #00a389;
    
    /* Transition */
    --bg-transition: rgba(0, 198, 184, 0.06);

    /* Navigation & Tabs */
    --bg-tabs: #e2f4f1;
    --shadow-tab: rgba(60, 211, 173, 0.15);

    /* Calendar Grid */
    --text-cal-day: #4a4a4a;
    --bg-cal-day: #fbfaff;
    --border-cal-day: #f0ecf7;
    --bg-cal-done: linear-gradient(135deg, #00c2a8, #00b39a);
    --shadow-cal-done: rgba(0, 194, 168, 0.3);
  
    /* Typography */
    --text-micro: 10px;
    --text-xs: 12px;
    --text-sm: 14px;
    --text-base: 16px;
    --text-lg: 18px;
    --text-xl: 22px;
    --text-2xl: 26px;
    --text-3xl: 30px;
    --text-4xl: 38px;
    --text-5xl: 52px;
    --text-huge: 64px;

    --fw-medium: 600;
    --fw-bold: 700;
    --fw-extra: 800;
    --fw-black: 900;

    /* Spacing */
    --space-2: 2px;
    --space-4: 4px;
    --space-5: 5px;
    --space-6: 6px;
    --space-7: 7px;
    --space-8: 8px;
    --space-10: 10px;
    --space-12: 12px;
    --space-14: 14px;
    --space-16: 16px;
    --space-18: 18px;
    --space-20: 20px;
    --space-22: 22px;
    --space-24: 24px;
    --space-26: 26px;
    --space-30: 30px;
    --space-36: 36px;
    --space-40: 40px;
    --space-60: 60px;
}
  * { box-sizing: border-box; }
  html, body {
    margin:0; padding:0;
    background:linear-gradient(160deg,#eafff6 0%,#fff8ec 100%);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    color:var(--text-primary);
    min-height:100vh;
  }
  #app { max-width:480px; margin:0 auto; padding:var(--space-20) var(--space-16) var(--space-40); }
  h1,h2,h3,p { margin:0; }

  /* ---- shared card ---- */
  .card {
    background:var(--bg-card); border:1px solid var(--border-card); border-radius:26px;
    padding:var(--space-24); text-align:center; box-shadow:0 8px 24px rgba(255,140,90,0.12);
  }

  /* ---- button system (Synced with Figma Component Set) ---- */
  button { border:none; border-radius:var(--radius-md); font-weight:var(--fw-bold); cursor:pointer; font-family:inherit; -webkit-tap-highlight-color:transparent; transition:all 0.15s ease; display:inline-flex; align-items:center; justify-content:center; gap:var(--space-8); box-sizing:border-box; outline:none; }
  button:active { transform:scale(0.97); }
  button:disabled { opacity:0.4; cursor:default; transform:none; }

  /* Sizes (Figma Component Variants) */
  .btn-xl { width:100%; padding:var(--space-16); font-size:var(--text-lg); border-radius:var(--radius-lg); min-height:55px; }
  .btn-lg { width:100%; padding:14px var(--space-20); font-size:var(--text-base); border-radius:var(--radius-lg); min-height:52px; }
  .btn-md { width:auto; padding:12px var(--space-16); font-size:var(--text-sm); border-radius:var(--radius-md); min-height:44px; }
  .btn-sm { width:auto; padding:8px var(--space-12); font-size:var(--text-xs); border-radius:var(--radius-sm); min-height:34px; }
  .btn-xs { width:auto; padding:6px var(--space-8); font-size:var(--text-micro); border-radius:var(--radius-xs); min-height:28px; }
  .btn-flex { flex:1; width:auto; }

  /* Variants (Figma Button Properties) */
  .btn-primary { background:var(--brand-gradient); color:var(--text-white); box-shadow:0 6px 18px var(--btn-shadow); border:none; }
  .btn-primary:disabled { background:var(--bg-disabled); box-shadow:none; color:var(--text-disabled); }
  .btn-secondary { background:var(--bg-accent); color:var(--border-accent); border:none; font-weight:var(--fw-bold); }
  .btn-outlined { background:var(--bg-accent); color:var(--border-accent); border:1px solid var(--border-accent); font-weight:var(--fw-bold); }
  .btn-tertiary { background:transparent; color:var(--text-secondary); border:none; padding:0 !important; }
  .btn-warning, .btn-danger { background:var(--bg-danger); color:var(--text-danger); border:none; font-weight:var(--fw-bold); }
  
  /* Icon Buttons (Modifier) */
  .btn-icon { width:auto; padding:var(--space-8) var(--space-10) !important; font-size:var(--text-base) !important; border-radius:var(--radius-md) !important; display:inline-flex; align-items:center; justify-content:center; }
  .btn-danger { color:var(--text-danger) !important; background:var(--bg-danger) !important; border:none; }

  
  /* Exact size/margin restores */
  .btn-ghost-layout { margin-top:var(--space-10); }
  .btn-new-layout { padding:var(--space-18); margin-bottom:var(--space-18); font-size: var(--text-lg); }
  .btn-play-layout { margin-top:var(--space-14); padding:var(--space-14); border-radius: 12px; }
  .btn-add-layout { margin-top:var(--space-16); }

  /* ---- progress / play ---- */
  .progress-bar { display:flex; gap:var(--space-4); margin-bottom:var(--space-20); }
  .progress-seg { flex:1; height:7px; border-radius:4px; background:var(--bg-accent); }
  .progress-seg.done { background:var(--progress-done); }
  .progress-seg.current { background:var(--text-danger); }

  /* ---- Stats Filter ---- */
  .filter-row { margin-bottom:var(--space-20); display: flex; align-items: center; gap:var(--space-10); background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 16px; padding:var(--space-10) var(--space-16); box-shadow: 0 4px 14px var(--shadow-card-light); }
  .filter-label { font-weight: var(--fw-extra); font-size: var(--text-sm); color: var(--text-secondary); white-space: nowrap; }
  .filter-select { flex: 1; border: none; background: transparent; font-size: var(--text-base); font-weight: var(--fw-extra); color: var(--text-highlight); outline: none; cursor: pointer; font-family: inherit; }

  .step-count { font-size: var(--text-base); color:var(--text-secondary); font-weight: var(--fw-extra); margin-bottom:var(--space-10); letter-spacing:0.5px; }
  .ex-name { font-size: var(--text-4xl); font-weight: var(--fw-extra); line-height:1.15; margin:var(--space-8) 0 var(--space-12); word-break:keep-all; color:var(--text-primary); }
  .ex-target { font-size: var(--text-lg); color:var(--text-highlight); font-weight: var(--fw-extra); margin-bottom:var(--space-18); word-break:keep-all; }
  .ex-desc { font-size: var(--text-base); color:var(--text-muted); line-height:1.55; margin-bottom:var(--space-24); word-break:keep-all; }
  .timer-display { font-size: var(--text-huge); font-weight: var(--fw-extra); font-variant-numeric:tabular-nums; margin:var(--space-14) 0 var(--space-22); color:var(--text-danger); }
  .timer-display.paused { color:var(--color-danger-light); }
  .guide-display { font-size: var(--text-2xl); color:var(--accent-color); font-weight: var(--fw-extra); margin:var(--space-14) 0 var(--space-22); }
  .badge { display:inline-block; padding:var(--space-6) var(--space-16); border-radius:20px; font-size: var(--text-sm); font-weight: var(--fw-extra); margin-bottom:var(--space-16); background:var(--badge-bg); color:var(--badge-text); }
  .timer-display.resting { color:var(--badge-text); }

  /* ---- intro / done ---- */
  .intro-emoji, .done-emoji { font-size: var(--text-5xl); margin-bottom:var(--space-14); }
  .intro-title, .done-title { font-size: var(--text-3xl); font-weight: var(--fw-extra); margin-bottom:var(--space-14); word-break:keep-all; color:var(--text-primary); }
  .done-title { color:var(--text-highlight); }
  .intro-list { text-align:left; background:var(--bg-secondary); border-radius:16px; padding:var(--space-18) var(--space-20); margin-bottom:var(--space-26); }
  .intro-list-item { font-size: var(--text-base); color:var(--text-muted); line-height:1.7; word-break:keep-all; }
  .intro-list-item b { color:var(--accent-color); }
  .done-sub { font-size: var(--text-base); color:var(--text-muted); margin-bottom:var(--space-22); line-height:1.6; word-break:keep-all; }
  .reminder-card { background:var(--bg-notice); border-radius:16px; padding:var(--space-20) var(--space-22); margin-top:var(--space-16); text-align:left; font-size: var(--text-base); color:var(--text-notice); line-height:1.55; word-break:keep-all; }
  .reminder-card b { color:var(--text-notice-bold); }

  /* ---- list screen ---- */
  .list-title { font-size: var(--text-3xl); font-weight: var(--fw-extra); margin-bottom:var(--space-4); }
  .list-sub { font-size: var(--text-base); color:var(--text-secondary); margin-bottom:var(--space-20); }
  .routine-card { background:var(--bg-card); border:1px solid var(--border-card); border-radius:20px; padding:var(--space-20) var(--space-20); margin-bottom:var(--space-14); box-shadow:0 4px 14px rgba(255,140,90,0.08); text-align:left; }
  .routine-card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:var(--space-10); }
  .routine-name { font-size: var(--text-xl); font-weight: var(--fw-extra); color:var(--text-primary); word-break:keep-all; }
  .routine-meta { font-size: var(--text-sm); color:var(--text-secondary); margin-top:var(--space-4); font-weight: var(--fw-bold); }
  .icon-btns { display:flex; gap:var(--space-6); flex-shrink:0; }
  .empty-state { text-align:center; color:var(--text-secondary); font-size: var(--text-base); padding:var(--space-30) var(--space-10); }

  /* ---- builder ---- */
  .builder-title { font-size: var(--text-2xl); font-weight: var(--fw-extra); margin-bottom:var(--space-18); }
  .form-label { display:block; font-size: var(--text-sm); font-weight: var(--fw-extra); color:var(--text-secondary); margin:var(--space-16) 0 var(--space-8); text-transform:uppercase; letter-spacing:0.5px; text-align:left; }
  /* Unified Input Styles (Synced with Figma Input Component) */
  .form-input, .form-textarea {
    width:100%; border-radius:var(--radius-lg); border:1px solid var(--border-accent); box-sizing:border-box;
    font-family:inherit; background:var(--bg-card); color:var(--text-primary); transition:all 0.2s ease;
    box-shadow: 0 2px 6px rgba(0, 198, 184, 0.04);
  }
  .form-input::placeholder, .form-textarea::placeholder { color:var(--text-secondary); font-weight: var(--fw-medium); }
  .form-input:focus, .form-textarea:focus { outline:none; border-color:var(--accent-color); box-shadow:0 0 0 4px rgba(0, 198, 184, 0.18); background:#ffffff; }
  .form-textarea { resize:none; min-height:70px; padding:var(--space-16); font-size: var(--text-base); }
  
  /* Input Sizes (Figma Specifications) */
  .input-base { padding:14px var(--space-16); font-size: var(--text-base); border-radius:var(--radius-lg); }
  .input-big { padding:16px var(--space-18); font-size: var(--text-xl); font-weight: var(--fw-bold); border-radius:var(--radius-lg); }
  .input-flex { padding:14px var(--space-40) 14px var(--space-14); font-size: var(--text-lg); text-align:center; border-radius:var(--radius-md); }

  /* Input Contexts */
  .type-toggle { display:flex; gap:var(--space-8); margin-top:var(--space-6); }
  .num-row { display:flex; gap:var(--space-10); align-items:center; margin-top:var(--space-6); }
  .num-group { flex:1; text-align:center; position:relative; }
  .num-group label { position:absolute; top:50%; right:14px; transform:translateY(-50%); text-align:right; font-size: var(--text-sm); color:var(--text-secondary); font-weight: var(--fw-bold); pointer-events:none; }
  .num-group label { position:absolute; top:50%; right:14px; transform:translateY(-50%); text-align:right; font-size: var(--text-sm); color:var(--text-secondary); font-weight: var(--fw-bold); pointer-events:none; }
  .add-ex-panel { background:var(--bg-card); border:1px solid var(--border-accent); border-radius:20px; padding:var(--space-18); margin-top:var(--space-10); }
  .steps-section-title { font-size: var(--text-sm); font-weight: var(--fw-extra); color:var(--text-secondary); margin:var(--space-26) 0 var(--space-10); text-transform:uppercase; letter-spacing:0.5px; }
  .step-item { display:flex; align-items:center; gap:var(--space-10); background:var(--bg-card); border:1px solid var(--border-base); border-radius:16px; padding:var(--space-12) var(--space-14); margin-bottom:var(--space-10); }
  .step-item-main { flex:1; text-align:left; }
  .step-item-name { font-size: var(--text-base); font-weight: var(--fw-extra); color:var(--text-primary); }
  .step-item-detail { font-size: var(--text-sm); color:var(--text-secondary); font-weight: var(--fw-bold); margin-top:var(--space-2); }
  
  /* Transition block specific overrides */
  .step-item.transition-step {
    min-height: auto;
    padding:var(--space-4) var(--space-14);
    background: var(--bg-transition);
    border: none;
    box-shadow: none;
    border-radius: 12px;
    margin-bottom:var(--space-8);
  }
  .step-item.transition-edit {
    padding:var(--space-12);
    background: var(--bg-transition);
    border: 1px solid rgba(255, 140, 90, 0.3);
    border-radius: 12px;
  }
  .save-bar { display:flex; gap:var(--space-10); margin-top:var(--space-24); }
  .loading-text { text-align:center; padding:var(--space-60) var(--space-10); color:var(--text-secondary); font-size: var(--text-base); font-weight: var(--fw-bold); }

  /* 인라인 편집 스타일 */
  .step-item.editing {
    display: block;
    text-align: left;
    background: var(--bg-card);
    border: 2px solid var(--accent-color);
    box-shadow: 0 4px 12px var(--btn-shadow);
    border-radius: 20px;
    padding:var(--space-18);
    box-sizing: border-box;
  }

  /* 드래그 핸들 스타일 */
  .drag-handle {
    cursor: grab;
    padding:var(--space-8);
    color: var(--text-secondary);
    font-size: var(--text-lg);
    user-select: none;
  }
  .drag-handle:active {
    cursor: grabbing;
  }

  /* ---- tabs ---- */
  .main-tabs {
    display: flex;
    background: var(--bg-tabs);
    border-radius: 16px;
    padding:var(--space-4);
    margin-bottom:var(--space-24);
  }
  .main-tab-btn {
    flex: 1;
    border: none;
    background: none;
    padding:var(--space-12);
    font-size: var(--text-base);
    font-weight: var(--fw-extra);
    color: var(--text-secondary);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    outline: none;
  }
  .main-tab-btn.active {
    background: var(--bg-card);
    color: var(--accent-color);
    box-shadow: 0 4px 12px rgba(124, 92, 255, 0.15);
  }

  /* ---- stats dashboard ---- */
  .stats-dashboard {
    display: flex;
    flex-direction: column;
    gap:var(--space-8);
  }
  .stats-summary-row {
    display: flex;
    gap:var(--space-12);
    margin-bottom:var(--space-8);
  }
  .stats-card {
    flex: 1;
    background: var(--bg-card);
    border: 1px solid var(--border-card);
    border-radius: 20px;
    padding:var(--space-16) var(--space-8);
    text-align: center;
    box-shadow: 0 4px 14px rgba(255,140,90,0.06);
  }
  .stats-card-val {
    font-size: var(--text-xl);
    font-weight: var(--fw-black);
    color: var(--accent-color);
  }
  .stats-card-lbl {
    font-size: var(--text-xs);
    color: var(--text-secondary);
    font-weight: var(--fw-extra);
    margin-top:var(--space-4);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .dashboard-section {
    margin-top:var(--space-14);
  }
  .section-title {
    font-size: var(--text-sm);
    font-weight: var(--fw-extra);
    color: var(--text-secondary);
    margin-bottom:var(--space-10);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-align: left;
  }

  /* ---- calendar grid ---- */
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap:var(--space-6);
    text-align: center;
  }
  .cal-header {
    font-size: var(--text-xs);
    font-weight: var(--fw-extra);
    color: var(--text-secondary);
    padding-bottom:var(--space-2);
  }
  .cal-day {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    font-size: var(--text-sm);
    font-weight: var(--fw-extra);
    color: var(--text-cal-day);
    position: relative;
    background: var(--bg-cal-day);
    border: 1px solid var(--border-cal-day);
  }
  .cal-day.today {
    border: 2px solid var(--accent-color);
    color: var(--accent-color);
  }
  .cal-day.completed {
    background: var(--accent-color);
    color: var(--bg-card);
    border: none;
    box-shadow: 0 4px 10px rgba(0, 194, 168, 0.3);
  }
  .cal-day.completed.today {
    border: 2px solid var(--accent-color);
  }
  .cal-day.empty {
    background: none;
    border: none;
  }
  .completed-check {
    font-size: var(--text-micro);
    position: absolute;
    bottom: 2px;
    font-weight: var(--fw-black);
  }
  .day-num {
    margin-top:-var(--space-2);
  }

  #toast-container { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap:var(--space-10); pointer-events: none; width: 100%; align-items: center; }
  .toast { background: rgba(43,43,43,0.95); color: var(--text-white); padding:var(--space-14) var(--space-22); border-radius: 12px; font-size: var(--text-base); font-weight: var(--fw-bold); box-shadow: 0 8px 24px rgba(0,0,0,0.2); animation: toast-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; text-align: center; max-width: 90vw; word-break: keep-all; }
  @keyframes toast-in { from { opacity: 0; transform: translateY(-20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes toast-out { from { opacity: 1; transform: translateY(0) scale(1); } to { opacity: 0; transform: translateY(-20px) scale(0.95); } }


  /* ---- Custom Tooltip ---- */
  #custom-tooltip {
    position: fixed;
    background: rgba(20, 45, 40, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: #eafff6;
    padding:var(--space-10) var(--space-16);
    border-radius: 14px;
    font-size: var(--text-sm);
    font-weight: var(--fw-bold);
    pointer-events: none;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.2s cubic-bezier(0.4, 0, 0.2, 1), transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    white-space: pre-wrap;
    text-align: center;
    transform: translate(-50%, calc(-100% - 10px));
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
    line-height: 1.5;
    letter-spacing: 0.3px;
  }
  #custom-tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    margin-left:-var(--space-6);
    border-width: 6px;
    border-style: solid;
    border-color: rgba(20, 45, 40, 0.85) transparent transparent transparent;
  }

  /* ---- Figma Exact Component Styles ---- */

  /* Main Tabs (Figma Segmented Pill) */

/* ---------------- helpers ---------------- */
function fmt(sec) {
  if (isNaN(sec) || sec < 0) sec = 0;
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${s < 10 ? '0' : ''}${s}`;
}

function estimateMinutes(routine) {
  if (!routine || !routine.steps) return 0;
  let totalSec = 0;
  routine.steps.forEach(s => {
    const sets = s.sets || 1;
    const rest = s.restSeconds || 0;
    let stepSec = 0;
    if (s.type === 'timer' || s.type === 'transition') {
      stepSec = s.seconds || 0;
    } else {
      stepSec = (s.reps || 10) * 3; // 1 rep = 3 seconds
    }
    totalSec += (stepSec + rest) * sets;
  });
  return Math.max(1, Math.round(totalSec / 60));
}

function stepDetail(s) {
  const sets = s.sets || 1;
  const rest = s.restSeconds ? ` (${s.restSeconds}초 휴식)` : '';
  if (s.type === 'transition') return `${s.seconds}초 휴식 및 전환`;
  if (s.type === 'timer') return `${s.seconds}초 • ${sets}세트${rest}`;
  return `${s.reps}개 • ${sets}세트${rest}`;
}

function initSortable() {

      animation: 150,
      handle: ".step-drag-handle",
      onEnd: (evt) => {
        const { oldIndex, newIndex } = evt;
        if (oldIndex === newIndex || oldIndex == null || newIndex == null) return;
        const b = state.builder;
        if (!b || !b.steps) return;
        const moved = b.steps.splice(oldIndex, 1)[0];
        b.steps.splice(newIndex, 0, moved);
        render();
      }
    });
  } catch(e) {
    console.warn("Sortable initialize failed", e);
  }
}

/* ---------------- Audio Beep ---------------- */
function playBeep(times = 1) {
  if (state.soundEnabled === false) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    let count = 0;
    const interval = setInterval(() => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.15);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.15);
      count++;
      if (count >= times) clearInterval(interval);
    }, 200);
  } catch (e) {}
}

function startTimer() {
  clearTimer();
  state.play.timerId = setInterval(() => {
    if (!state.play || state.play.paused) return;
    if (state.play.remaining > 0) {

      const el = document.querySelector(".digital-timer");
      if (el) el.textContent = fmt(state.play.remaining);
    } else {

      nextStep();
    }
  }, 1000);
}

        <div class="routine-card" style="background:var(--bg-card); border-radius:24px; padding:20px; margin-bottom:16px; box-shadow:0 8px 24px rgba(0,200,222,0.08); border:1px solid var(--border-base);">
          <div class="routine-card-top" style="display:flex; justify-content:space-between; align-items:flex-start;">
            <div onclick="goIntro('${id}')" style="flex:1;cursor:pointer;">
              ${r.original_author ? `
                <div style="font-size:var(--text-xs); color:var(--text-secondary); display:flex; align-items:center; gap:var(--space-4); margin-bottom:var(--space-2);">
                  <span style="display:inline-flex; align-items:center;">${renderAvatarHtml(r.original_author.avatar, 14)}</span>
                  <span>${escapeHtml(r.original_author.name || '알 수 없음')}님의 루틴${r.is_modified ? '을 바탕으로 제작' : ''}</span>

              <div class="routine-name" style="font-size:20px; font-weight:var(--fw-black); color:var(--text-primary);">${escapeHtml(r.name)}</div>
              <div class="routine-meta" style="font-size:var(--text-sm); color:var(--text-secondary); margin-top:4px;">
                ${r.steps.filter(s => s.type !== 'transition').length}단계 • 약 ${estimateMinutes(r)}분
              </div>
            </div>
            <div class="icon-btns" style="display:flex; gap:8px;">
              <button style="background:#def7f2; color:#00c6b8; width:36px; height:36px; border-radius:10px; border:none; cursor:pointer;" onclick="goEditRoutine('${id}')">✏️</button>
              <button style="background:#def7f2; color:#00c6b8; width:36px; height:36px; border-radius:10px; border:none; cursor:pointer;" onclick="shareRoutine('${id}')" title="공유하기">${r.shareCode ? '🔗' : '📤'}</button>
            </div>
          </div>
          ${(state.routines[id] && state.routines[id].progress) 
    ? `<div style="display:flex; gap:var(--space-8); margin-top:var(--space-16);">
         <button class="btn-xl" style="flex:1; background:#def7f2; color:#00c6b8; border-radius:16px; font-weight:var(--fw-bold);" onclick="confirmResetAndStart('${id}')">처음부터 시작</button>
         <button class="btn-xl btn-primary" style="flex:1; border-radius:16px;" onclick="resumePlay('${id}')">이어서 하기</button>
       </div>`
    : `<button class="btn-xl btn-primary" style="margin-top:var(--space-16); border-radius:16px;" onclick="goIntro('${id}')">시작하기</button>`}
        </div>`;
    }).join("");
  }
  const nameDisplay = (state.userProfile && state.userProfile.display_name) ? escapeHtml(state.userProfile.display_name) : '나';
  return `
    <button class="status-btn" onclick="state.screen='profile';render();">프로필</button>
    <button class="status-btn" onclick="handleLogout()">로그아웃</button>
  </div>
    <div class="main-tabs">
      <button class="main-tab-btn active" onclick="goList()">내 루틴</button>
      <button class="main-tab-btn" onclick="goStatsTab()">통계</button>
    </div>
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:4px;">
      ${state.userProfile && state.userProfile.display_name ? renderAvatarHtml(state.userProfile.avatar_url, 36) : ''}
      <div style="font-size:24px; font-weight:var(--fw-black); color:var(--text-primary);">${nameDisplay}의 루틴</div>
    </div>
    <div style="font-size:var(--text-sm); color:var(--text-secondary); margin-bottom:var(--space-16);">저장된 루틴을 선택하거나 새로 만들어 보세요</div>
    <button style="border:1px dashed #00c6b8; background:#def7f2; color:#00c6b8; font-weight:var(--fw-bold); font-size:var(--text-base); border-radius:16px; width:100%; padding:14px; margin-bottom:20px; cursor:pointer;" onclick="goNewRoutine()">+ 새 루틴 만들기</button>
    ${cards}`;
}

function renderIntro() {
  const r = state.routines[state.currentId];
  if (!r) { state.screen = "list"; return renderList(); }
  return `
    <div class="card">
      <div class="intro-emoji">🧘</div>
      ${r.original_author ? `
        <div style="font-size:var(--text-sm); color:var(--text-secondary); display:flex; align-items:center; justify-content:center; gap:var(--space-6); margin-bottom:var(--space-4);">
          <span style="display:inline-flex; align-items:center;">${renderAvatarHtml(r.original_author.avatar, 18)}</span>
          <span>${escapeHtml(r.original_author.name || '알 수 없음')}님의 루틴${r.is_modified ? '을 바탕으로 제작' : ''}</span>
        </div>
      ` : ''}
      <div class="intro-title">${escapeHtml(r.name)}</div>
      <div class="intro-list">
        <div class="intro-list-item">총 <b>${r.steps.filter(s => s.type !== 'transition').length}단계</b>, 약 <b>${estimateMinutes(r)}분</b></div>
        <div class="intro-list-item">⏱ 시간 진행 단계는 자동 카운트다운 + 종료 시 알림음</div>
        <div class="intro-list-item">🔢 횟수 진행 단계는 직접 "다음" 버튼으로 넘기기</div>
      </div>
      <button class="btn-xl btn-primary" onclick="startPlay()">시작하기 ▶</button>
      <button class="btn-lg btn-tertiary" onclick="goList()">← 목록으로</button>
    </div>`;
}

function renderPlay(routine) {
  if (!routine || !routine.steps || !routine.steps[state.play.current]) { state.screen = "list"; return renderList(); }
  const s = routine.steps[state.play.current];
  const segs = routine.steps.map((_, i) => {
    let cls = "progress-seg";
    if (i < state.play.current) cls += " done";
    else if (i === state.play.current) cls += " current";
    return `<div class="${cls}"></div>`;
  }).join("");

  const prevEx = state.play.current > 0 ? routine.steps[state.play.current - 1] : null;
  const nextEx = state.play.current < routine.steps.length - 1 ? routine.steps[state.play.current + 1] : null;
  const totalSets = s.sets || 1;

  let dotsHtml = "";
  for (let i = 1; i <= totalSets; i++) {
    let dCls = "set-indicator-dot";
    if (i < state.play.currentSet) dCls += " done";
    else if (i === state.play.currentSet) dCls += " current";
    dotsHtml += `<div class="${dCls}">${i < state.play.currentSet ? '✓' : i}</div>`;
  }

  let body = "";
  if (s.type === 'transition' || state.play.isResting) {
    if (!state.play.remaining) state.play.remaining = s.type === 'transition' ? s.seconds : (s.restSeconds || 15);
    const nextTargetEx = routine.steps.slice(state.play.current + 1).find(st => st.type !== 'transition');
    const nextName = nextTargetEx ? nextTargetEx.name : "종료";
    body = `
      <div style="display:flex; justify-content:space-between; align-items:center; width:100%; margin-bottom:var(--space-16);">
        <span class="badge" style="background:#def7f2; color:#00c6b8; font-weight:var(--fw-bold); border-radius:20px; padding:6px 12px;">✓ ${s.type === 'transition' ? '휴식 및 전환' : '휴식 중'}</span>
        <div class="set-indicator-row">${dotsHtml}</div>
      </div>
      <div style="font-size:var(--text-base); color:var(--text-secondary); margin-bottom:4px; text-align:center;">${escapeHtml(s.name)}</div>
      <div style="font-size:36px; font-weight:var(--fw-black); color:var(--text-primary); text-align:center; margin-bottom:4px;">휴식</div>
      <div style="font-size:var(--text-base); color:var(--text-secondary); text-align:center; margin-bottom:16px;">다음 세트를 준비하세요</div>
      <div class="digital-timer">${fmt(state.play.remaining)}</div>
      <button style="background:#def7f2; color:#00c6b8; font-size:18px; font-weight:var(--fw-bold); width:100%; padding:14px; border-radius:16px; border:none; cursor:pointer; margin-top:16px;" onclick="nextStep()">바로 시작</button>`;
  } else if (s.type === "timer") {
    if (!state.play.remaining) state.play.remaining = s.seconds;
    body = `
      <div style="display:flex; justify-content:space-between; align-items:center; width:100%; margin-bottom:var(--space-16);">
        <span class="badge" style="background:#def7f2; color:#00c6b8; font-weight:var(--fw-bold); border-radius:20px; padding:6px 12px;">⏱ 시간 진행</span>
        <div class="set-indicator-row">${dotsHtml}</div>
      </div>
      <div style="font-size:28px; font-weight:var(--fw-black); color:var(--text-primary); text-align:center; margin-bottom:4px;">${escapeHtml(s.name)}</div>
      ${s.target ? `<div style="font-size:var(--text-base); font-weight:var(--fw-bold); color:var(--text-secondary); text-align:center; margin-bottom:8px;">${escapeHtml(s.target)}</div>` : ""}
      ${s.desc ? `<div style="font-size:var(--text-sm); color:var(--text-secondary); text-align:center; margin-bottom:16px;">${escapeHtml(s.desc)}</div>` : ""}
      <div class="digital-timer">${fmt(state.play.remaining)}</div>
      <div class="btn-row">
        <button class="btn-xl btn-secondary btn-flex" style="background:#def7f2; color:#00c6b8; border-radius:16px;" onclick="togglePause()">${state.play.paused ? "▶ 시작" : "⏸ 일시정지"}</button>
        <button class="btn-xl btn-primary btn-flex" style="border-radius:16px;" onclick="nextStep()">다음 →</button>
      </div>`;
  } else {
    body = `
      <div style="display:flex; justify-content:space-between; align-items:center; width:100%; margin-bottom:var(--space-16);">
        <span class="badge" style="background:#def7f2; color:#00c6b8; font-weight:var(--fw-bold); border-radius:20px; padding:6px 12px;">✓ 횟수 진행</span>
        <div class="set-indicator-row">${dotsHtml}</div>
      </div>
      <div style="font-size:28px; font-weight:var(--fw-black); color:var(--text-primary); text-align:center; margin-bottom:4px;">${escapeHtml(s.name)}</div>
      ${s.target ? `<div style="font-size:var(--text-base); font-weight:var(--fw-bold); color:var(--text-secondary); text-align:center; margin-bottom:8px;">${escapeHtml(s.target)}</div>` : ""}
      ${s.desc ? `<div style="font-size:var(--text-sm); color:var(--text-secondary); text-align:center; margin-bottom:16px;">${escapeHtml(s.desc)}</div>` : ""}
      <div style="font-size:42px; font-weight:var(--fw-black); color:#00c6b8; text-align:center; margin:20px 0;">${s.reps} 개</div>
      <button class="btn-xl btn-primary" style="width:100%; border-radius:16px;" onclick="nextStep()">세트 완료 ✓</button>`;
  }

  const prevText = prevEx ? `← 이전 세트 ( ${escapeHtml(prevEx.name)} )` : '← 이전';
  const nextText = nextEx ? `건너뛰기 ( ${escapeHtml(nextEx.name)} ) →` : '건너뛰기 →';

  return `
    <button class="status-btn" onclick="state.screen='profile';render();">프로필</button>
    <button class="status-btn" onclick="handleLogout()">로그아웃</button>
  </div>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--space-12); width:100%;">
      <div style="font-size:18px; font-weight:var(--fw-black); color:#00c6b8;">${state.play.current + 1} of ${routine.steps.length}</div>
      <div style="font-size:var(--text-base); font-weight:var(--fw-bold); color:var(--text-secondary);">${escapeHtml(routine.name)}</div>
      <div style="display:flex; gap:12px;">
        <button class="btn-sm btn-tertiary btn-icon" onclick="toggleSound()">${state.soundEnabled ? "🔊" : "🔇"}</button>
        <button class="btn-sm btn-tertiary btn-icon" onclick="confirmExitPlay()">✕</button>
      </div>
    </div>
    <div class="progress-bar" style="margin-bottom:var(--space-16);">${segs}</div>
    <div class="card" style="background:#ffffff; border-radius:24px; padding:24px; border:1px solid var(--border-base); box-shadow:0 8px 24px rgba(0,200,222,0.08);">
      ${body}
    </div>
    <div style="display:flex; justify-content:space-between; margin-top:20px; font-size:var(--text-sm); font-weight:var(--fw-bold); color:var(--text-secondary);">
      <div style="cursor:pointer;" onclick="prevStep()">${prevText}</div>
      <div style="cursor:pointer;" onclick="nextStep()">${nextText}</div>
    </div>`;
}

function renderDone(routine) {
  if (state.routines[routine.id] && state.routines[routine.id].progress) {
    delete state.routines[routine.id].progress;
    persistRoutine(state.routines[routine.id]);
  }
  const reminder = routine.id === "tva-core" ? `
    <div class="reminder-card">
      <b>💡 하루 틈틈이 잊지 마세요</b><br/>
      스탠딩/시팅 스터마 배큠 — 정식 루틴 시간엔 포함되지 않지만, 앉아있을 때 틈틈이 의식적으로 복부를 당겨 습관성 브레이싱을 연습하세요.
    </div>` : "";
  return `
    <div class="card">
      <div class="done-emoji">✅</div>
      <div class="done-title">루틴 완료!</div>
      <div class="done-sub">${escapeHtml(routine.name)}을(를) 모두 마쳤어요.</div>
      ${reminder}
      <button class="btn-xl btn-primary" onclick="restartRoutine()" style="margin-top:var(--space-16);">처음부터 다시</button>
      <button class="btn-lg btn-tertiary" onclick="goList()">목록으로</button>
    </div>`;
}

function renderBuilder() {
  const b = state.builder;
  if (!b) return "";
  const isTimer = formDraft.type === "timer";

  let stepsHtml = "";
  if (b.steps.length === 0) {
    stepsHtml = `<div class="empty-state" style="padding:var(--space-20);">아직 추가된 운동이 없습니다.</div>`;
  } else {
    stepsHtml = `<div class="step-list">` +
      b.steps.map((s, i) => {
        if (b.editingStepIndex === i) {
          return renderInlineStepEditor(i, s);
        } else {
          const isTrans = s.type === 'transition';
          return `
            <div class="step-item-figma ${isTrans ? 'transition-type' : ''}" data-id="${i}">
              <div style="display:flex; align-items:center; flex:1; gap:10px;">
                <div class="step-drag-handle">≡</div>
                <div>
                  <div style="font-size:16px; font-weight:var(--fw-bold); color:var(--text-primary);">${escapeHtml(s.name)}</div>
                  <div style="font-size:var(--text-xs); color:var(--text-secondary); margin-top:2px;">${stepDetail(s)}</div>
                </div>
              </div>
              <div style="display:flex; gap:6px;">
                <button class="icon-btn-edit" onclick="startInlineEdit(${i})">✏️</button>
                <button class="icon-btn-delete" onclick="removeStep(${i})">🗑️</button>
              </div>
            </div>`;
        }
      }).join("") + `</div>`;
  }

  return `
    <div class="builder-title" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--space-18);">
      <span style="font-size:22px; font-weight:var(--fw-black); color:var(--text-primary);">${b.editingId ? "루틴 수정" : "새 루틴 만들기"}</span>
      ${b.editingId ? `
        <div style="font-size:var(--text-sm); display:flex; align-items:center; gap:var(--space-8);">
          ${state.routines[b.editingId]?.shareCode 
            ? `<button class="btn-xs btn-secondary" onclick="navigator.clipboard.writeText('${state.routines[b.editingId].shareCode}').then(() => alert('코드가 복사되었습니다.'));">🔗 공유 코드 복사</button>` 
            : `<button class="btn-xs btn-secondary" onclick="shareRoutine('${b.editingId}')">🔗 공유 코드 발급</button>`}
        </div>
      ` : `
        <button class="btn-xs btn-secondary" onclick="promptImportRoutineToBuilder()">🔗 루틴코드로 불러오기</button>
      `}
    </div>

    <label style="font-size:var(--text-sm); font-weight:var(--fw-bold); color:var(--text-secondary);">루틴 이름<span class="lbl-req">*</span></label>
    <input class="form-input-text" style="font-size:22px; font-weight:var(--fw-black); margin-bottom:var(--space-20);" type="text" placeholder="예: TVA 코어 루틴" value="${escapeAttr(b.name)}" oninput="updateBuilderName(this.value)" />

    <div class="steps-section-title" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--space-12);">
      <span style="font-size:var(--text-sm); font-weight:var(--fw-bold); color:var(--text-secondary);">운동 목록 (${b.steps.length})</span>
      <button class="btn-xs btn-secondary" onclick="promptInsertTransitions()">⏳ 휴식 및 전환 추가</button>
    </div>
    ${stepsHtml}

    <div class="card" style="background:#ffffff; border-radius:20px; padding:20px; text-align:left; margin-top:var(--space-16); border:1px solid var(--border-base);">
      <label style="font-size:var(--text-sm); font-weight:var(--fw-bold); color:var(--text-secondary);">운동 이름<span class="lbl-req">*</span></label>
      <input class="form-input-text" type="text" placeholder="푸쉬업" value="${escapeAttr(formDraft.name)}" oninput="updateForm('name', this.value)" />

      <label style="font-size:var(--text-sm); font-weight:var(--fw-bold); color:var(--text-secondary); margin-top:var(--space-16); display:block;">타겟 부위 (선택)</label>
      <input class="form-input-text" type="text" placeholder="예: 갑빠, 둔근" value="${escapeAttr(formDraft.target)}" oninput="updateForm('target', this.value)" />

      <label style="font-size:var(--text-sm); font-weight:var(--fw-bold); color:var(--text-secondary); margin-top:var(--space-16); display:block;">설명 (선택)</label>
      <textarea class="form-textarea-underline" placeholder="동작 방법이나 주의사항" oninput="updateForm('desc', this.value)">${escapeHtml(formDraft.desc)}</textarea>

      <label style="font-size:var(--text-sm); font-weight:var(--fw-bold); color:var(--text-secondary); margin-top:var(--space-16); display:block;">진행 방식<span class="lbl-req">*</span></label>
      <div class="type-toggle" style="display:flex; gap:var(--space-8); margin-top:var(--space-6);">
        <button class="btn-md btn-flex ${isTimer ? 'btn-secondary' : 'btn-tertiary'}" onclick="setFormType('timer')">⏱ 시간 진행</button>
        <button class="btn-md btn-flex ${!isTimer ? 'btn-secondary' : 'btn-tertiary'}" onclick="setFormType('manual')">✓ 횟수 진행</button>
      </div>

      ${isTimer ? `
        <div class="num-row" style="display:flex; gap:12px; margin-top:16px;">
          <div class="num-group" style="flex:1;">
            <input class="form-input-num" type="number" min="0" value="${formDraft.mm}" oninput="updateForm('mm', this.value)" />
            <label style="font-size:var(--text-sm); color:var(--text-secondary); font-weight:var(--fw-bold);">분</label>
          </div>
          <div class="num-group" style="flex:1;">
            <input class="form-input-num" type="number" min="0" max="59" value="${formDraft.ss}" oninput="updateForm('ss', this.value)" />
            <label style="font-size:var(--text-sm); color:var(--text-secondary); font-weight:var(--fw-bold);">초</label>
          </div>
        </div>
        <div class="num-row" style="display:flex; gap:12px; margin-top:16px;">
          <div class="num-group" style="flex:1;">
            <input class="form-input-num" type="number" min="1" value="${formDraft.sets}" oninput="updateForm('sets', this.value)" />
            <label style="font-size:var(--text-sm); color:var(--text-secondary); font-weight:var(--fw-bold);">세트</label>
          </div>
          <div class="num-group" style="flex:1;">
            <input class="form-input-num" type="number" min="0" value="${formDraft.restSeconds}" oninput="updateForm('restSeconds', this.value)" />
            <label style="font-size:var(--text-sm); color:var(--text-secondary); font-weight:var(--fw-bold);">초 휴식</label>
          </div>
        </div>` : `
        <div class="num-row" style="display:flex; gap:12px; margin-top:16px;">
          <div class="num-group" style="flex:1;">
            <input class="form-input-num" type="number" min="1" value="${formDraft.reps}" oninput="updateForm('reps', this.value)" />
            <label style="font-size:var(--text-sm); color:var(--text-secondary); font-weight:var(--fw-bold);">개</label>
          </div>
          <div class="num-group" style="flex:1;">
            <input class="form-input-num" type="number" min="1" value="${formDraft.sets}" oninput="updateForm('sets', this.value)" />
            <label style="font-size:var(--text-sm); color:var(--text-secondary); font-weight:var(--fw-bold);">세트</label>
          </div>
          <div class="num-group" style="flex:1;">
            <input class="form-input-num" type="number" min="0" value="${formDraft.restSeconds}" oninput="updateForm('restSeconds', this.value)" />
            <label style="font-size:var(--text-sm); color:var(--text-secondary); font-weight:var(--fw-bold);">초 휴식</label>
          </div>
        </div>`}

      <button class="btn-lg btn-secondary" style="width:100%; margin-top:var(--space-20);" onclick="addExerciseFromForm()">+ 운동 추가</button>
    </div>

    <div style="display:flex; gap:var(--space-10); margin-top:var(--space-20);">
      <button class="btn-lg btn-secondary btn-flex" onclick="goList()">취소</button>
      <button class="btn-lg btn-primary btn-flex" onclick="saveRoutine()">루틴 저장</button>
    </div>`;
}

/* ---------------- stats logic ---------------- */
async function goStatsTab() {
  clearTimer();
  state.statsFilter = "all";
  state.statsCalendarOffset = 0;
  state.statsWeekOffset = 0;
  state.screen = "stats";
  render();
  
  if (state.user && typeof supabaseClient !== 'undefined') {
    try {
      const { data, error } = await supabaseClient
        .from('shared_routines')
        .select('import_count, routine_data')
        .eq('author_id', state.user.id);
      if (!error && data) {
        state.importCounts = {};
        data.forEach(r => {

function reloadFromLocalStorage() {
  try {
    const listRaw = localStorage.getItem("routines:list");
    if (!listRaw) return;
    const ids = JSON.parse(listRaw);
    const routines = {};
    for (const id of ids) {
      const raw = localStorage.getItem("routines:" + id);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (parsed && parsed.steps) {
          parsed.steps.forEach(step => {
            if (step.sets === undefined) step.sets = 1;
            if (step.restSeconds === undefined) step.restSeconds = 0;
          });
        }
        routines[id] = parsed;
      }
    }
    state.routineOrder = ids.filter(id => routines[id]);
    state.routines = routines;
  } catch (e) {
    console.error("reload failed", e);
  }
}

async function syncData() {
  if (!state.user || !supabaseClient) return;
  try {
    state.syncStatus = "syncing";
    render();
    
    const { data, error } = await supabaseClient
      .from('user_sync')
      .select('*')
      .eq('user_id', state.user.id)
      .maybeSingle();
      
    const localOrder = JSON.parse(localStorage.getItem("routines:list") || "[]");
    const localHistory = JSON.parse(localStorage.getItem("routines:history") || "[]");
    const localUpdatedAt = parseInt(localStorage.getItem("routines:updated_at") || "0");
    
    const localRoutines = {};
    localOrder.forEach(id => {
      const raw = localStorage.getItem("routines:" + id);
      if (raw) localRoutines[id] = JSON.parse(raw);
    });
    
    if (!data) {
      // No record exists, push local data!
      const now = new Date().toISOString();
      const { error: insertError } = await supabaseClient
        .from('user_sync')
        .insert({
          user_id: state.user.id,
          routine_order: localOrder,
          routines: localRoutines,
          history: localHistory,
          updated_at: now
        });
      if (insertError) throw insertError;
      localStorage.setItem("routines:updated_at", Date.parse(now).toString());
      state.syncStatus = "success";
    } else {
      const remoteUpdatedAt = Date.parse(data.updated_at);
      
      if (localUpdatedAt > remoteUpdatedAt) {
        // Local is newer, push!
        const now = new Date().toISOString();
        const { error: updateError } = await supabaseClient
          .from('user_sync')
          .update({
            routine_order: localOrder,
            routines: localRoutines,
            history: localHistory,
            updated_at: now
          })
          .eq('user_id', state.user.id);
        if (updateError) throw updateError;
        localStorage.setItem("routines:updated_at", Date.parse(now).toString());
        state.syncStatus = "success";
      } else if (remoteUpdatedAt > localUpdatedAt) {
        // RESCUE CHECK: If remote is just the default routine and empty history, but local has real data, 
        // it means the remote was accidentally wiped by a new device login. Push local instead!
        const isRemoteWiped = data.routine_order && data.routine_order.length === 1 && data.routine_order[0] === 'tva-default' && (!data.history || data.history.length === 0);
        const hasLocalData = localOrder.length > 1 || (localOrder.length === 1 && localOrder[0] !== 'tva-default') || localHistory.length > 0;
        
        if (isRemoteWiped && hasLocalData) {
          // Push local instead to rescue data!
          const now = new Date().toISOString();
          const { error: rescueError } = await supabaseClient
            .from('user_sync')
            .update({
              routine_order: localOrder,
              routines: localRoutines,
              history: localHistory,
              updated_at: now
            })
            .eq('user_id', state.user.id);
          if (!rescueError) {
            localStorage.setItem("routines:updated_at", Date.parse(now).toString());
          }
          state.syncStatus = "success";
        } else {
          // Normal pull
          const remoteHistory = data.history || [];
          const mergedHistoryMap = {};
          localHistory.forEach(l => { if (l.id) mergedHistoryMap[l.id] = l; });
          remoteHistory.forEach(l => { if (l.id) mergedHistoryMap[l.id] = l; });
          const mergedHistory = Object.values(mergedHistoryMap).sort((a,b) => b.timestamp - a.timestamp);
          
          localStorage.setItem("routines:list", JSON.stringify(data.routine_order));
          localStorage.setItem("routines:history", JSON.stringify(mergedHistory));
          
          localOrder.forEach(id => localStorage.removeItem("routines:" + id));
          const remoteRoutines = data.routines || {};
          for (const id in remoteRoutines) {
            localStorage.setItem("routines:" + id, JSON.stringify(remoteRoutines[id]));
          }
          
          localStorage.setItem("routines:updated_at", remoteUpdatedAt.toString());
          
          reloadFromLocalStorage();
          state.syncStatus = "success";
        }

      } else {
        // Equal, no action needed
        state.syncStatus = "success";
      }
    }
  } catch (err) {
    console.error("Sync error:", err);
    state.syncStatus = "error";
  } finally {
    render();
  }
}

function logRoutineCompletion(routine) {
  try {
    const logsRaw = localStorage.getItem("routines:history") || "[]";
    let logs;
    try {
      logs = JSON.parse(logsRaw);
    } catch(e) {
      logs = [];
    }
    if (Array.isArray(logs)) {
      logs = logs.filter(l => l.id && !l.id.startsWith("dummy-log-"));
    } else {
      logs = [];
    }
    
    // Calculate total duration of this routine
    let totalSec = 0;
    if (state.play && state.play.startTime) {
      totalSec = Math.round((Date.now() - state.play.startTime) / 1000);
    } else {
      routine.steps.forEach(s => {
        const sets = s.sets || 1;
        if (s.type === "timer") {
          totalSec += s.seconds * sets;
        } else {
          totalSec += (s.reps || 10) * sets * 3;
        }
        if (sets > 1) {
          totalSec += (s.restSeconds || 0) * (sets - 1);
        }
      });
    }

    const localDate = new Date();
    const offset = localDate.getTimezoneOffset();
    const adjustedDate = new Date(localDate.getTime() - (offset*60*1000));
    const todayStr = adjustedDate.toISOString().split('T')[0]; // "YYYY-MM-DD"
    
    const newLog = {
      id: "log-" + Date.now(),
      routineId: routine.id,
      routineName: routine.name,
      timestamp: Date.now(),
      date: todayStr,
      durationSeconds: totalSec
    };
    
    logs.push(newLog);
    localStorage.setItem("routines:history", JSON.stringify(logs));
    triggerCloudSync();
  } catch (e) {
    console.error("Failed to save history log", e);
  }
}

function getHistoryLogs() {

  }

function calculateStreak(logs) {
  if (logs.length === 0) return 0;
  
  const dates = [...new Set(logs.map(l => l.date))].sort().reverse();
  
  const localDate = new Date();
  const offset = localDate.getTimezoneOffset();
  const adjustedDate = new Date(localDate.getTime() - (offset*60*1000));
  const todayStr = adjustedDate.toISOString().split('T')[0];
  
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const adjustedYesterday = new Date(yesterday.getTime() - (yesterday.getTimezoneOffset()*60*1000));
  const yesterdayStr = adjustedYesterday.toISOString().split('T')[0];
  
  if (!dates.includes(todayStr) && !dates.includes(yesterdayStr)) {
    return 0;
  }
  
  let streak = 0;
  let currentDate = new Date();
  
  if (!dates.includes(todayStr)) {
    currentDate.setDate(currentDate.getDate() - 1);
  }
  
  while (true) {
    const adjDate = new Date(currentDate.getTime() - (currentDate.getTimezoneOffset()*60*1000));
    const dateStr = adjDate.toISOString().split('T')[0];
    if (dates.includes(dateStr)) {
      streak++;
      currentDate.setDate(currentDate.getDate() - 1);
    } else {
      break;
    }
  }
  return streak;
}

function generateWeeklyChart(logs) {
  const chartDays = [];
  const today = new Date();
  today.setDate(today.getDate() + (state.statsWeekOffset * 7));
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(today.getDate() - i);
    chartDays.push(d);
  }
  
  const fDate = (d) => `${d.getMonth() + 1}.${d.getDate()}`;
  const weekRangeStr = `${fDate(chartDays[0])} ~ ${fDate(chartDays[6])}`;
  
  const CHART_COLORS = ['var(--accent-color)', '#ff8a65', '#8a6ef5', '#f56e9d', '#6e9df5', '#ffca28'];
  
  const weeklyData = chartDays.map(day => {
    const localD = new Date(day.getTime() - (day.getTimezoneOffset()*60*1000));
    const dateStr = localD.toISOString().split('T')[0];
    const dayLogs = logs.filter(l => l.date === dateStr);
    
    const routinesMap = {};
    dayLogs.forEach(l => {
      if (!routinesMap[l.routineId]) routinesMap[l.routineId] = { duration: 0, name: state.routines[l.routineId]?.name || '알 수 없는 루틴' };
      routinesMap[l.routineId].duration += l.durationSeconds;
    });
    
    const segments = Object.keys(routinesMap).map(id => {
      const mins = Math.round(routinesMap[id].duration / 60);
      return { id, name: routinesMap[id].name, minutes: mins, duration: routinesMap[id].duration };
    }).filter(s => s.minutes > 0);
    
    const totalMinutes = segments.reduce((sum, s) => sum + s.minutes, 0);
    const totalDuration = segments.reduce((sum, s) => sum + s.duration, 0);
    
    const formatDur = (sec) => {
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return m > 0 ? (s > 0 ? `${m}분 ${s}초` : `${m}분`) : `${s}초`;
    };
    
    let tooltipHtml = `<div style="font-size:11px; color:#9cb3b0; margin-bottom:var(--space-6); font-weight:600; text-align:left;">${dateStr}</div>`;
    if (segments.length === 0) {
      tooltipHtml += `<div style="color:#6e8d89; font-size:13px;">운동 기록 없음</div>`;
    } else {
      const rows = segments.map(s => `<div style="display:flex; justify-content:space-between; align-items:center; gap:var(--space-16); margin-bottom:var(--space-4); font-size:13px; text-align:left;"><span style="color:#ffffff;">${s.name}</span><span style="color:#46efc5; font-weight:800;">${formatDur(s.duration)}</span></div>`).join("");
      tooltipHtml += rows;
      if (segments.length > 1) {
        tooltipHtml += `<div style="margin-top:var(--space-8); padding-top:var(--space-6); border-top:1px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between; align-items:center; gap:var(--space-16); font-size:13px; text-align:left;"><span style="color:#9cb3b0; font-weight:600;">총 합계</span><span style="color:#00c8de; font-weight:800;">${formatDur(totalDuration)}</span></div>`;
      }
    }
    
    return {
      label: day.toLocaleDateString('ko-KR', { weekday: 'short' }),
      segments,
      totalMinutes,
      tooltip: tooltipHtml
    };
  });
  
  const maxMinutes = Math.max(...weeklyData.map(d => d.totalMinutes), 10);
  
  const svgWidth = 400;
  const svgHeight = 160;
  const paddingLeft = 30;
  const paddingRight = 10;
  const paddingTop = 20;
  const paddingBottom = 25;
  
  const chartWidth = svgWidth - paddingLeft - paddingRight;
  const chartHeight = svgHeight - paddingTop - paddingBottom;
  
  const colWidth = chartWidth / 7;
  const barWidth = colWidth * 0.5;
  
  let barsSvg = "";
  let gridLinesSvg = "";
  
  const gridVals = [0, Math.round(maxMinutes / 2), maxMinutes];
  gridVals.forEach(val => {
    const y = paddingTop + chartHeight - (val / maxMinutes) * chartHeight;
    gridLinesSvg += `
      <line x1="${paddingLeft}" y1="${y}" x2="${svgWidth - paddingRight}" y2="${y}" stroke="#f0ecf7" stroke-dasharray="4" />
      <text x="${paddingLeft - 8}" y="${y + 4}" fill="var(--text-secondary)" font-size="11" font-weight="700" text-anchor="end">${val}</text>
    `;
  });

  weeklyData.forEach((d, idx) => {
    const x = paddingLeft + idx * colWidth + (colWidth - barWidth) / 2;
    const isToday = state.statsWeekOffset === 0 && idx === 6;
    const textFill = isToday ? "var(--accent-color)" : "var(--text-secondary)";
    
    let currentY = paddingTop + chartHeight;
    let stackHtml = "";
    
    d.segments.forEach((seg, sIdx) => {
      const h = (seg.minutes / maxMinutes) * chartHeight;
      const y = currentY - h;
      const colorIdx = state.routineOrder.indexOf(seg.id);
      const color = colorIdx >= 0 ? CHART_COLORS[colorIdx % CHART_COLORS.length] : "var(--accent-color)";
      
      stackHtml += `<rect x="${x}" y="${y}" width="${barWidth}" height="${h}" fill="${color}" rx="3" />`;
      currentY = y;
    });
    
    const yTotal = paddingTop + chartHeight - ((d.totalMinutes / maxMinutes) * chartHeight);
    
    barsSvg += `
      <g style="cursor:pointer;" data-tooltip="${d.tooltip.replace(/"/g, '&quot;')}">
        
        ${stackHtml}
        ${d.totalMinutes > 0 ? `<text x="${x + barWidth/2}" y="${yTotal - 6}" fill="${textFill}" font-size="11" font-weight="800" text-anchor="middle">${d.totalMinutes}</text>` : ""}
        <rect x="${x}" y="${paddingTop}" width="${barWidth}" height="${chartHeight}" fill="transparent" />
      </g>
      <text x="${x + barWidth/2}" y="${svgHeight - 8}" fill="${textFill}" font-size="12" font-weight="800" text-anchor="middle">${d.label}</text>
    `;
  });
  
  return `
    <div class="chart-container" style="background:var(--bg-card);border:1px solid var(--border-card);border-radius:20px;padding:var(--space-16);box-shadow:0 4px 14px rgba(255,140,90,0.06);">
      <div class="chart-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--space-12);">
        <button onclick="changeWeekOffset(-1)" style="background:none; border:none; font-size: var(--text-base); font-weight: var(--fw-extra); color:var(--accent-color); cursor:pointer; padding:var(--space-4); outline:none;">◀</button>
        <span style="font-size: var(--text-sm); font-weight: var(--fw-extra); color:var(--text-primary);">${weekRangeStr}</span>
        <button onclick="changeWeekOffset(1)" style="background:none; border:none; font-size: var(--text-base); font-weight: var(--fw-extra); color:var(--accent-color); cursor:pointer; padding:var(--space-4); outline:none; ${state.statsWeekOffset >= 0 ? "opacity:0.3; pointer-events:none;" : ""}">▶</button>
      </div>
      <svg viewBox="0 0 ${svgWidth} ${svgHeight}" width="100%" height="100%" style="overflow:visible;font-family:inherit;">
        ${gridLinesSvg}
        ${barsSvg}
      </svg>
    </div>`;
}

function generateCalendarGrid(logs) {
  const today = new Date();
  today.setMonth(today.getMonth() + state.statsCalendarOffset);
  const year = today.getFullYear();
  const month = today.getMonth();
  
  const monthNames = ["1월", "2월", "3월", "4월", "5월", "6월", "7월", "8월", "9월", "10월", "11월", "12월"];
  const weekdays = ["일", "월", "화", "수", "목", "금", "토"];
  
  const firstDay = new Date(year, month, 1).getDay();
  const totalDays = new Date(year, month + 1, 0).getDate();
  
  let gridHtml = weekdays.map(w => `<div class="cal-header">${w}</div>`).join("");
  
  for (let i = 0; i < firstDay; i++) {
    gridHtml += `<div class="cal-day empty"></div>`;

  const actualToday = new Date();
  for (let day = 1; day <= totalDays; day++) {
    const dStr = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    const dayLogs = logs.filter(l => l.date === dStr);
    const isCompleted = dayLogs.length > 0;

    let dayCls = "cal-day";
    if (isCompleted) dayCls += " completed";
    if (isToday) dayCls += " today";
    
    let tooltipAttr = "";
    if (isCompleted) {
      const rMap = {};
      dayLogs.forEach(l => {
        if (!rMap[l.routineId]) rMap[l.routineId] = { duration: 0, name: state.routines[l.routineId]?.name || '알 수 없는 루틴' };
        rMap[l.routineId].duration += l.durationSeconds;
      });
      const formatDur = (sec) => {
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        return m > 0 ? (s > 0 ? `${m}분 ${s}초` : `${m}분`) : `${s}초`;
      };

      let tooltipHtml = `<div style="font-size:11px; color:#9cb3b0; margin-bottom:var(--space-6); font-weight:600; text-align:left;">${dStr}</div>${rows}`;
      tooltipAttr = ` data-tooltip="${tooltipHtml.replace(/"/g, '&quot;')}" `;
    }
    
    gridHtml += `
      <div class="${dayCls}" ${tooltipAttr} style="${tooltipAttr ? 'cursor:pointer;' : ''}">
        <span class="day-num">${day}</span>
        ${isCompleted ? `<span class="completed-check">✓</span>` : ""}
      </div>`;
  }
  
  return `
    <div class="calendar-card" style="background:var(--bg-card);border:1px solid var(--border-card);border-radius:26px;padding:var(--space-20);box-shadow:0 8px 24px rgba(255,140,90,0.06);">
      <div class="calendar-header-row" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--space-12);">
        <button onclick="changeCalendarOffset(-1)" style="background:none; border:none; font-size: var(--text-base); font-weight: var(--fw-extra); color:var(--accent-color); cursor:pointer; padding:var(--space-4); outline:none;">◀</button>
        <div class="calendar-title" style="font-size: var(--text-lg);font-weight: var(--fw-extra);color:var(--text-primary);margin:0;">${year}년 ${monthNames[month]}</div>
        <button onclick="changeCalendarOffset(1)" style="background:none; border:none; font-size: var(--text-base); font-weight: var(--fw-extra); color:var(--accent-color); cursor:pointer; padding:var(--space-4); outline:none; ${state.statsCalendarOffset >= 0 ? "opacity:0.3; pointer-events:none;" : ""}">▶</button>
      </div>
      <div style="padding:0 var(--space-12);">
        <div class="calendar-grid">
          ${gridHtml}
        </div>
      </div>
    </div>`;
}

function generateRecentActivity(logs) {
  if (logs.length === 0) {
    return `<div class="empty-state">아직 완료된 기록이 없습니다.</div>`;
  }
  
  const sortedLogs = [...logs].sort((a, b) => b.timestamp - a.timestamp);
  const totalPages = Math.ceil(sortedLogs.length / 5);
  const page = state.activityPage || 0;
  const pagedLogs = sortedLogs.slice(page * 5, (page + 1) * 5);
  
  const items = pagedLogs.map(l => {
    const dateObj = new Date(l.timestamp);
    const dateStr = dateObj.toLocaleDateString('ko-KR', { month: 'long', day: 'numeric' });
    const timeStr = dateObj.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false });
    
    const formatDur = (sec) => {
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return m > 0 ? (s > 0 ? `${m}분 ${s}초` : `${m}분`) : `${s}초`;
    };
    const durStr = formatDur(l.durationSeconds);
    
    return `
      <div class="activity-item" style="display:flex;justify-content:space-between;align-items:center;padding:var(--space-14) var(--space-16);border-bottom:1px solid #f0ecf7;">
        <div style="text-align:left;">
          <div style="font-weight: var(--fw-extra);font-size: var(--text-base);color:var(--text-primary);">${escapeHtml(l.routineName)} 완료</div>
          <div style="font-size: var(--text-xs);color:var(--text-secondary);font-weight: var(--fw-bold);margin-top:var(--space-2);">${dateStr} ${timeStr}</div>
        </div>
        <div style="display:flex;align-items:center;gap:var(--space-12);">
          <div style="font-weight: var(--fw-extra);font-size: var(--text-base);color:var(--text-highlight);">⏱ ${durStr}</div>
          <button onclick="deleteLog('${l.id}')" style="background:none;border:none;cursor:pointer;color:var(--text-danger);font-size: var(--text-base);padding:var(--space-4);outline:none;" title="기록 삭제">🗑</button>
        </div>
      </div>
    `;
  }).join("");
  
  const pageControls = totalPages > 1 ? `
    <div style="display:flex;justify-content:center;align-items:center;margin-top:var(--space-12);gap:var(--space-16);">
      <button onclick="changeActivityPage(-1)" ${page === 0 ? "disabled" : ""} style="background:none;border:none;cursor:pointer;color:${page === 0 ? '#ccc' : 'var(--accent-color)'};font-size: var(--text-lg);">◀</button>
      <span style="font-size: var(--text-sm);font-weight: var(--fw-bold);color:var(--text-secondary);">${page + 1} / ${totalPages}</span>
      <button onclick="changeActivityPage(1)" ${page === totalPages - 1 ? "disabled" : ""} style="background:none;border:none;cursor:pointer;color:${page === totalPages - 1 ? '#ccc' : 'var(--accent-color)'};font-size: var(--text-lg);">▶</button>
    </div>
  ` : "";

  return `
    <div class="activity-card" style="background:var(--bg-card);border:1px solid var(--border-card);border-radius:20px;box-shadow:0 4px 14px rgba(255,140,90,0.06);overflow:hidden;">
      ${items}
    </div>
    ${pageControls}
  `;
}

function changeActivityPage(delta) {
  state.activityPage = (state.activityPage || 0) + delta;
  render();
}

async function deleteLog(logId) {
  showConfirm("정말 이 기록을 삭제하시겠습니까?", async () => {
    const logsRaw = localStorage.getItem("routines:history") || "[]";
    let logs = [];
    try { logs = JSON.parse(logsRaw); } catch(e) {}
    
    logs = logs.filter(l => l.id !== logId);
    localStorage.setItem("routines:history", JSON.stringify(logs));
    
    await triggerCloudSync();
    render();
  });
}

function renderStats() {
  const allLogs = getHistoryLogs();
  
  const filterVal = state.statsFilter || "all";
  const logs = filterVal === "all" 
    ? allLogs 
    : allLogs.filter(l => l.routineId === filterVal);
  
  const totalCompleted = logs.length;
  let totalSeconds = 0;
  logs.forEach(l => totalSeconds += l.durationSeconds);
  const totalMinutes = Math.round(totalSeconds / 60);
  
  const streak = calculateStreak(logs);
  
  const chartHtml = generateWeeklyChart(logs);
  const calendarHtml = generateCalendarGrid(logs);
  const recentActivityHtml = generateRecentActivity(logs);

  const options = state.routineOrder.map(id => {
    const r = state.routines[id];
    if (!r) return "";
    const isSelected = filterVal === id ? "selected" : "";
    return `<option value="${id}" ${isSelected}>${escapeHtml(r.name)}</option>`;
  }).join("");

  return `
    <div class="main-tabs">
      <button class="main-tab-btn" onclick="goList()">내 루틴</button>
      <button class="main-tab-btn active" onclick="goStatsTab()">통계</button>
    </div>
    
    <div class="filter-row">
      <label for="stats-routine-filter" class="filter-label">📊 분석 대상:</label>
      <select id="stats-routine-filter" class="filter-select" onchange="filterStatsByRoutine(this.value)">
        <option value="all" ${filterVal === "all" ? "selected" : ""}>전체 루틴 (통합)</option>
        ${options}
      </select>
    </div>
    
    <div class="stats-dashboard">
      <div class="stats-summary-row" style="flex-wrap: wrap;">
        <div class="stats-card" style="flex: 1 1 45%;">
          <div class="stats-card-lbl">총 완료</div>
          <div class="stats-card-val">${totalCompleted}회</div>
        </div>
        <div class="stats-card" style="flex: 1 1 45%;">
          <div class="stats-card-lbl">누적 시간</div>
          <div class="stats-card-val">${totalMinutes}분</div>
        </div>
        <div class="stats-card" style="flex: 1 1 45%;">
          <div class="stats-card-lbl">연속 일수</div>
          <div class="stats-card-val">${streak}일</div>
        </div>
        ${state.importCounts !== undefined ? `
        <div class="stats-card" style="flex: 1 1 45%;">
          <div class="stats-card-lbl">코드 등록 횟수</div>
          <div class="stats-card-val">${filterVal === "all" ? Object.values(state.importCounts).reduce((a,b)=>a+b,0) : (state.importCounts[filterVal] || 0)}회</div>
        </div>
        ` : ''}
      </div>
      
      <div class="dashboard-section">
        <div class="section-title">📊 주간 운동 통계 (분)</div>
        ${chartHtml}
      </div>

      <div class="dashboard-section">
        <div class="section-title">📅 기록 달력</div>
        ${calendarHtml}
      </div>

      <div class="dashboard-section">
        <div class="section-title">⏱ 최근 활동 로그</div>
        ${recentActivityHtml}
      </div>
    </div>`;
}

/* ---------------- utils ---------------- */



function showCodePrompt(title, placeholder, onSubmit, btnText = '불러오기', isCodeStyle = true) {
  const container = document.createElement('div');
  container.className = 'modal-backdrop';
  
  const box = document.createElement('div');
  box.className = 'modal-box';
  
  const titleEl = document.createElement('div');
  titleEl.textContent = title;
  titleEl.className = 'modal-title';
  
  const inputEl = document.createElement('input');
  inputEl.type = 'text';
  inputEl.className = 'form-input input-base';
  inputEl.placeholder = placeholder || '';
  if (isCodeStyle) {
    inputEl.maxLength = 10;
    inputEl.classList.add('code-input');
  } else {
    inputEl.type = 'number';
  }
  
  const btnRow = document.createElement('div');
  btnRow.className = 'btn-row';
  
  const btnCancel = document.createElement('button');
  btnCancel.textContent = '취소';
  btnCancel.className = 'btn-md btn-secondary btn-flex';
  
  const btnSubmit = document.createElement('button');
  btnSubmit.textContent = btnText;
  btnSubmit.className = 'btn-md btn-primary btn-flex';
  
  const close = () => {
    container.style.opacity = '0';
    box.style.transform = 'scale(0.92)';
    setTimeout(() => { if (container.parentNode) container.parentNode.removeChild(container); }, 200);
  };
  
  btnCancel.onclick = close;
  
  const submit = () => {
    const val = inputEl.value.trim();
    if (!val) return;
    close();
    onSubmit(val);
  };
  
  btnSubmit.onclick = submit;
  inputEl.onkeydown = (e) => {
    if (e.key === 'Enter') submit();
    if (e.key === 'Escape') close();
  };
  
  btnRow.appendChild(btnCancel);
  btnRow.appendChild(btnSubmit);
  box.appendChild(titleEl);
  box.appendChild(inputEl);
  box.appendChild(btnRow);
  container.appendChild(box);
  document.body.appendChild(container);
  
  requestAnimationFrame(() => {
    container.style.opacity = '1';
    box.style.transform = 'scale(1)';
    inputEl.focus();
  });
}

function showConfirm(msg, onConfirm) {
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:10000; display:flex; justify-content:center; align-items:center; opacity:0; transition:opacity 0.2s;';
  
  const box = document.createElement('div');
  box.style.cssText = 'background:var(--bg-card); border-radius:20px; padding:var(--space-24); max-width:320px; width:90%; text-align:center; box-shadow:0 12px 32px rgba(0,0,0,0.15); transform:scale(0.95); transition:transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);';
  
  const text = document.createElement('div');
  text.textContent = msg;
  text.style.cssText = 'font-size: var(--text-base); font-weight: var(--fw-extra); color:var(--text-primary); margin-bottom:var(--space-20); word-break:keep-all; line-height:1.5;';
  
  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex; gap:var(--space-10); justify-content:center;';
  
  const btnCancel = document.createElement('button');
  btnCancel.textContent = '취소';
  btnCancel.style.cssText = 'flex:1; padding:var(--space-14); border-radius:14px; background:var(--bg-accent); color:var(--text-secondary); font-size: var(--text-base); font-weight: var(--fw-extra); border:none; cursor:pointer; outline:none;';
  
  const btnOk = document.createElement('button');
  btnOk.textContent = '확인';
  btnOk.style.cssText = 'flex:1; padding:var(--space-14); border-radius:14px; background:var(--brand-gradient); color:var(--text-white); font-size: var(--text-base); font-weight: var(--fw-extra); border:none; cursor:pointer; outline:none;';
  
  btnCancel.onclick = () => {
    container.style.opacity = '0';
    box.style.transform = 'scale(0.95)';
    setTimeout(() => container.remove(), 200);
  };
  
  btnOk.onclick = () => {
    container.style.opacity = '0';
    box.style.transform = 'scale(0.95)';
    setTimeout(() => container.remove(), 200);
    onConfirm();
  };
  
  btnRow.appendChild(btnCancel);
  btnRow.appendChild(btnOk);
  box.appendChild(text);
  box.appendChild(btnRow);
  container.appendChild(box);
  document.body.appendChild(container);
  
  requestAnimationFrame(() => {
    container.style.opacity = '1';
    box.style.transform = 'scale(1)';
  });
}

function showToast(msg) {
  let container = document.getElementById('toast-container');
  if (!container) {
    container = document.createElement('div');
    container.id = 'toast-container';
    document.body.appendChild(container);
  }
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.animation = 'toast-out 0.3s ease forwards';
    setTimeout(() => toast.remove(), 300);
  }, 2500);
}

function escapeHtml(str) {
  if (!str) return "";
  return String(str).replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));
}
function escapeAttr(str) { return escapeHtml(str); }


/* ---------------- init ---------------- */
function init() {
  try {
    const listRaw = localStorage.getItem("routines:list");
    if (!listRaw) {
      state.routineOrder = [DEFAULT_TVA_ROUTINE.id];
      state.routines = { [DEFAULT_TVA_ROUTINE.id]: DEFAULT_TVA_ROUTINE };
      localStorage.setItem("routines:list", JSON.stringify(state.routineOrder));
      localStorage.setItem("routines:" + DEFAULT_TVA_ROUTINE.id, JSON.stringify(DEFAULT_TVA_ROUTINE));
    } else {
      const ids = JSON.parse(listRaw);
      const routines = {};
      for (const id of ids) {
        const raw = localStorage.getItem("routines:" + id);
        if (raw) {
          try { routines[id] = JSON.parse(raw); } catch(e) {}
        }
      }
      state.routineOrder = ids.filter(id => routines[id]);
      state.routines = routines;
      if (state.routineOrder.length === 0) {
        state.routineOrder = [DEFAULT_TVA_ROUTINE.id];
        state.routines = { [DEFAULT_TVA_ROUTINE.id]: DEFAULT_TVA_ROUTINE };
        localStorage.setItem("routines:list", JSON.stringify(state.routineOrder));
        localStorage.setItem("routines:" + DEFAULT_TVA_ROUTINE.id, JSON.stringify(DEFAULT_TVA_ROUTINE));
      }
    }
  } catch (e) {
    state.routineOrder = [DEFAULT_TVA_ROUTINE.id];
    state.routines = { [DEFAULT_TVA_ROUTINE.id]: DEFAULT_TVA_ROUTINE };
  }
  state.screen = "list";
  render();
}

init();
</script>
